services:
  valley-api:
    container_name: valley-api
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_URL=http://local.api.valley.newamericanhistory.org
      - DB_HOST=journey-db
      - DB_PORT=3307
      - DB_DATABASE=api.valley.newamericanhistory.org
      - DB_USERNAME=root
      - DB_PASSWORD=
      - SCOUT_DRIVER=null
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.valley-api.rule=Host(`local.api.valley.newamericanhistory.org`)"
      - "traefik.http.routers.valley-api.entrypoints=web"
      - "traefik.http.services.valley-api.loadbalancer.server.port=80"
    networks:
      journey-network:
        ipv4_address: ${VALLEY_API_IP:-172.20.5.1}

networks:
  journey-network:
    external: true
